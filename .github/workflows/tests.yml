name: Playwright regression suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run typecheck

      # Two tests (tagged [AI-DEMO]) are deliberately wrong on purpose, to guarantee a real
      # failure for the Task 3 AI Failure Explainer to analyze on every run — see README.md.
      # `continue-on-error` lets the job proceed to the check below instead of going red on
      # those two known, expected failures; the next step still fails the build if ANY other
      # test fails.
      - name: Run Playwright tests
        id: playwright
        continue-on-error: true
        run: npm test
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Fail the build only on unexpected failures
        run: node scripts/check-results.js

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            playwright-report/
            sample-output/
          retention-days: 14
